openapi: 3.0.0
info:
  title: User Service
  version: 1.1.0
paths:
  /api/v2/users:
    get:
      summary: List all users
      operationId: list_users
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          default: 20
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      summary: Create a new user
      operationId: create_user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUser'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /api/v2/users/{id}:
    get:
      summary: Get a user by ID
      operationId: get_user
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Not found
  /api/v2/users/{id}/contact:
    get:
      summary: Get user contact info
      operationId: get_user_contact
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Contact info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactInfo'
        '404':
          description: Not found
components:
  schemas:
    User:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
        email:
          type: string
          format: email
          nullable: true
        name:
          type: string
        avatar_url:
          type: string
          nullable: true
    CreateUser:
      type: object
      required:
      - name
      properties:
        email:
          type: string
          format: email
        name:
          type: string
    ContactInfo:
      type: object
      required:
      - email
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
